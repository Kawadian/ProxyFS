linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 20
  dupl:
    threshold: 120

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

run:
  timeout: 5m

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
