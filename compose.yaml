# LXC File Hub (lxcfh) — base Compose stack
# Hub + Samba sidecar share the lxcfh-fuse volume for SMB export.
# Enable test-node with: docker compose --profile test up

name: lxcfh

x-hub-env: &hub-env
  LXCFH_BIND_HOST: ${LXCFH_BIND_HOST:-0.0.0.0}
  LXCFH_BIND_PORT: ${LXCFH_BIND_PORT:-8080}
  LXCFH_DATA_DIR: /var/lib/lxcfh
  LXCFH_DB_PATH: /var/lib/lxcfh/lxcfh.db
  LXCFH_MASTER_KEY_PATH: /run/secrets/master.key
  LXCFH_FUSE_MOUNT: /fuse-mount
  LXCFH_FUSE_BACKEND: /fuse-share
  SMB_ENABLED: ${SMB_ENABLED:-false}

services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${LXCFH_VERSION:-dev}
        COMMIT: ${LXCFH_COMMIT:-local}
        BUILD_DATE: ${LXCFH_BUILD_DATE:-unknown}
    image: ${LXCFH_IMAGE:-lxcfh/hub:latest}
    container_name: lxcfh-hub
    restart: unless-stopped
    environment:
      <<: *hub-env
    ports:
      - "${LXCFH_HOST_PORT:-8080}:${LXCFH_BIND_PORT:-8080}"
      - "${LXCFH_SFTP_PORT:-2022}:2022"
    volumes:
      - lxcfh-data:/var/lib/lxcfh
      - lxcfh-fuse:/fuse-share:shared
      - ./secrets/dev/master.key:/run/secrets/master.key:ro
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/live | grep -q alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - lxcfh

  samba:
    profiles:
      - smb
      - full
    build:
      context: .
      dockerfile: Dockerfile.samba
    image: ${LXCFH_SAMBA_IMAGE:-lxcfh/samba:latest}
    container_name: lxcfh-samba
    restart: unless-stopped
    environment:
      SMB_USER: ${SMB_USER:-lxcfh}
      SMB_PASSWORD: ${SMB_PASSWORD:-changeme}
      SMB_SHARE_NAME: ${SMB_SHARE_NAME:-lxcfh}
      SMB_SHARE_PATH: /fuse-share
    ports:
      - "${SMB_HOST_PORT:-445}:445"
      - "${SMB_NBT_PORT:-139}:139"
    volumes:
      - lxcfh-fuse:/fuse-share:shared
    networks:
      - lxcfh

  test-node:
    profiles:
      - test
    image: linuxserver/openssh-server:9.7_p1-r1-ls184
    container_name: lxcfh-test-node
    restart: unless-stopped
    environment:
      PUID: ${TEST_NODE_PUID:-1000}
      PGID: ${TEST_NODE_PGID:-1000}
      TZ: ${TZ:-UTC}
      USER_NAME: ${TEST_NODE_USER:-sftpuser}
      USER_PASSWORD: ${TEST_NODE_PASSWORD:-sftppass}
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "false"
    ports:
      - "${TEST_NODE_SSH_PORT:-2222}:2222"
    volumes:
      - test-node-data:/config
      - test-node-uploads:/uploads
    networks:
      - lxcfh

volumes:
  lxcfh-data:
  lxcfh-fuse:
  test-node-data:
  test-node-uploads:

networks:
  lxcfh:
    driver: bridge
