name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.24.13"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Embed frontend (required for go:embed)
        run: make embed-frontend

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6
          args: --timeout 5m

      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: |
          mkdir -p coverage
          go test ./internal/config/... ./internal/migrate/... ./internal/crypto/... ./internal/auth/... ./internal/health/... ./internal/vfs/... -count=1 -short -race -coverprofile=coverage/unit.out

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit.out

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install libfuse (FUSE CGO)
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev

      - name: Integration tests
        run: CGO_ENABLED=1 go test ./test/integration/... -count=1 -tags=integration -timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install libfuse (FUSE CGO)
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev

      - name: Build hub binary
        run: make build VERSION=${{ github.sha }}

      - name: Build hub image
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg COMMIT=${{ github.sha }} \
            -t lxcfh/hub:ci \
            .

      - name: Build samba image
        run: docker build -f Dockerfile.samba -t lxcfh/samba:ci .

  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare secrets
        run: |
          mkdir -p secrets/dev
          openssl rand -hex 32 > secrets/dev/master.key
          chmod 600 secrets/dev/master.key

      - name: Compose up (hub only, SMB disabled)
        run: |
          docker compose --env-file .env.example up -d --build hub
          docker compose ps

      - name: Smoke test
        run: |
          chmod +x scripts/smoke.sh
          for i in $(seq 1 60); do
            if ./scripts/smoke.sh; then exit 0; fi
            sleep 2
          done
          docker compose logs hub
          exit 1

      - name: Compose down
        if: always()
        run: docker compose down -v --remove-orphans

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t lxcfh/hub:ci .
          docker build -f Dockerfile.samba -t lxcfh/samba:ci .

      - name: Trivy hub image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lxcfh/hub:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy samba image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lxcfh/samba:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build hub image
        run: docker build -t lxcfh/hub:ci .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: lxcfh/hub:ci
          format: spdx-json
          output-file: hub.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: hub.spdx.json
